<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);

  --shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;user-select:none;
  -webkit-touch-callout:none;-webkit-user-drag:none;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  line-height:1.85;scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}

/* ─── Sidebar ─── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;padding:6px 0;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  color:var(--sbText);text-decoration:none;padding:3px 4px;
  transition:all .25s;cursor:pointer;}
.sb-item:hover{color:#fff;}
.sb-item .sb-circle{display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;background:rgba(184,134,11,.15);
  border:1px solid rgba(184,134,11,.35);color:var(--goldL);
  font-family:"Noto Sans TC",sans-serif;font-weight:700;font-size:14px;
  transition:all .25s;}
.sb-item .sb-label{font-size:10.5px;letter-spacing:1px;line-height:1.2;
  text-align:center;opacity:.85;}
.sb-item:hover .sb-circle{background:rgba(212,168,75,.35);transform:scale(1.05);}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;border-color:var(--goldL);
  box-shadow:0 0 14px rgba(212,168,75,.55);}
.sb-item.active .sb-label{opacity:1;color:#fff;}

/* ─── Hamburger / Back-top ─── */
#sbToggle{position:fixed;top:14px;left:14px;width:42px;height:42px;
  border-radius:50%;background:var(--sbBg);color:var(--gold);border:0;
  font-size:18px;cursor:pointer;z-index:200;display:none;
  box-shadow:0 2px 8px rgba(0,0,0,.2);}
#backTop{position:fixed;right:18px;bottom:78px;width:44px;height:44px;
  border-radius:50%;background:var(--accent);color:#fff;border:0;
  font-size:18px;cursor:pointer;z-index:110;opacity:0;pointer-events:none;
  transition:opacity .3s;box-shadow:0 4px 14px rgba(0,0,0,.25);}
#backTop.show{opacity:1;pointer-events:auto;}
#backTop:hover{background:var(--primary);}

/* ─── 底部進度膠囊（中文＋接近頁尾淡出）─── */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* ─── Main / Hero ─── */
.main{margin-left:var(--sbW);padding:0;}
.site-hero{position:relative;background:var(--headGrad);color:#fff;
  padding:80px 24px 76px;text-align:center;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:280px;font-weight:900;
  color:#fff;opacity:.03;letter-spacing:30px;pointer-events:none;
  white-space:nowrap;font-family:"Noto Serif TC",serif;}
.hero-kicker{font-family:"Noto Sans TC",sans-serif;font-size:12px;
  letter-spacing:6px;color:var(--goldL);opacity:.85;

.hero-title{font-size:56px;font-weight:900;color:var(--goldL);

.hero-subtitle{font-size:20px;color:#e8dfc8;letter-spacing:4px;

.hero-sub{font-size:18px;color:#cfc09b;letter-spacing:2px;margin:0 0 6px;}
.hero-meta{font-size:18px;color:#b0a37e;letter-spacing:2px;margin-top:8px;}
.hero-range{display:inline-block;margin-top:20px;padding:6px 18px;

  font-size:14px;letter-spacing:3px;color:var(--goldL);}

/* ─── Preface ─── */
.preface{max-width:880px;margin:54px auto 26px;padding:0 28px;}
.preface h2{text-align:center;font-size:30px;color:var(--accent);

.preface p{font-size:19px;line-height:2.1;color:var(--text2);

/* ─── TOC ─── */
.toc-section{max-width:1100px;margin:30px auto 64px;padding:0 24px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);

.toc-desc{text-align:center;font-size:17px;color:var(--text2);

.toc-grid{display:grid;gap:18px;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
.toc-card{display:flex;flex-direction:column;gap:6px;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:18px 22px;text-decoration:none;
  color:var(--text);transition:all .25s;
  box-shadow:0 2px 6px var(--shadow);}
.toc-card:hover{transform:translateY(-2px);

.toc-card .toc-num{display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;font-weight:700;font-size:17px;
  font-family:"Noto Sans TC",sans-serif;}
.toc-card .toc-name{font-size:19.5px;font-weight:700;color:var(--text);
  letter-spacing:1px;line-height:1.7;}
.toc-card .toc-sub{font-size:14px;color:var(--text-muted);
  line-height:1.55;letter-spacing:.5px;}

.chapter{margin:0 0 24px;scroll-margin-top:18px;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;
  padding:46px 22px 42px;position:relative;}
.ch-head::after{content:"";display:block;width:80px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:18px auto 0;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;
  color:var(--goldL);letter-spacing:4px;opacity:.9;margin-bottom:8px;}
.ch-name{font-size:34px;font-weight:700;color:#fff;
  margin:0;letter-spacing:5px;line-height:1.3;}
.ch-sub{font-size:17px;color:#cfc09b;letter-spacing:2px;
  margin-top:10px;}
.ch-body{max-width:1020px;margin:30px auto;padding:0 24px;}

/* ─── Bridge ─── */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:12.5px;background:var(--gold);color:#fff;padding:3px 12px;
  border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;
  text-align:justify;}

/* ─── iframe ─── */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;min-height:180px;}

/* ─── Next-link ─── */
.next-link{display:inline-block;margin:18px 0 0;padding:10px 22px;
  background:var(--accent);color:#fff;text-decoration:none;
  border-radius:24px;font-size:17px;letter-spacing:2px;
  transition:all .25s;}
.next-link:hover{background:var(--primary);transform:translateX(4px);}

/* ─── Footer ─── */
.site-footer{margin-top:30px;padding:36px 24px 110px;text-align:center;
  background:var(--sbBg);color:var(--sbText);}
.site-footer p{margin:0;font-size:15px;letter-spacing:2px;opacity:.8;}

/* ─── Responsive ─── */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .hero-title{font-size:42px;letter-spacing:4px;}
  .site-hero{padding:60px 18px 56px;}
  .toc-section{margin:20px auto 42px;}
  .ch-head{padding:32px 18px 28px;}
  .ch-name{font-size:26px;letter-spacing:3px;}
  .ch-body{padding:0 14px;margin:22px auto;}
}
@media (max-width:600px){
  body{font-size:18px;}
  .hero-title{font-size:34px;}
  .toc-card .toc-name{font-size:17px;}
}

<script>
/* ─── Sidebar toggle (mobile) ─── */
(function(){
  var btn=document.getElementById('sbToggle');
  var sb =document.getElementById('sb');
  if(btn&&sb){
    btn.addEventListener('click',function(){ sb.classList.toggle('open'); });
  }
})();

/* ─── sb-brand click ─── */
(function(){
  var sbBrand=document.getElementById('sbBrand');
  if(sbBrand){
    sbBrand.addEventListener('click',function(e){
      e.preventDefault();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }
})();

/* ─── Read progress ─── */
var rpFill=document.getElementById('rpFill');
var rpPct =document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill) rpFill.style.width=pct+'%';
  if(rpPct)  rpPct.textContent =Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();

/* ─── Read progress · 接近頁尾自動淡出 ─── */
(function(){
  var cap=document.getElementById('readProgress');
  if(!cap) return;
  function setHide(on){ cap.classList.toggle('hide-near-end',!!on); }
  var targets=[];
  var f1=document.querySelector('[data-wy-notice="v2"]');
  if(f1) targets.push(f1);
  var f2=document.querySelector('.site-footer');
  if(f2) targets.push(f2);
  if(!targets.length) return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){ io.observe(t); });
  } else {
    var check=function(){
      var dh=document.documentElement.scrollHeight;
      var sb=window.scrollY+window.innerHeight;
      setHide(dh-sb<240);
    };
    window.addEventListener('scroll',check,{passive:true});
    check();
  }
})();

/* ─── Back to top ─── */
var bt=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  if(window.scrollY>600) bt.classList.add('show');
  else bt.classList.remove('show');
},{passive:true});
bt.addEventListener('click',function(){
  window.scrollTo({top:0,behavior:'smooth'});
});

/* ─── iframe 自動高度 ─── */
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body) return;
    d.body.style.minHeight='0';
    d.body.style.height   ='auto';
    if(d.documentElement){
      d.documentElement.style.minHeight='0';
      d.documentElement.style.height   ='auto';
    }
    var h=d.body.scrollHeight;
    if(h>100){
      f.style.height   =h+'px';
      f.style.minHeight='0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries<30) setTimeout(tick,200);
  }
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){
    tick();
  } else {
    f.addEventListener('load',tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){
  clearTimeout(rzT);
  rzT=setTimeout(resizeAllFrames,200);
});

/* ─── 錨點點擊先重算高度再捲動 ─── */
document.addEventListener('click',function(e){
  var a=e.target;
  while(a&&a.tagName!=='A') a=a.parentElement;
  if(!a) return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2) return;
  var id=h.substring(1);
  var el=document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});
  },60);
},true);

/* ─── 全域 recalc · 字型/圖片載入後重算 ─── */
var _rt=0,_riv=setInterval(function(){
  _rt++; resizeAllFrames();
  if(_rt>50) clearInterval(_riv);
},300);

/* ─── Sidebar 高亮 ─── */
var items=document.querySelectorAll('.sb-item');
var chapters=document.querySelectorAll('section.chapter');
function updateActive(){
  var current=null;
  var threshold=window.innerHeight*0.35;
  chapters.forEach(function(ch){
    var top=ch.getBoundingClientRect().top;
    if(top<threshold) current=ch;
  });
  items.forEach(function(it){ it.classList.remove('active'); });
  if(current){
    var id=current.id;
    var n=id.replace('chapter-','');
    var item=document.querySelector('.sb-item[data-ch="'+n+'"]');
    if(item){
      item.classList.add('active');
      // 確保 active 項在 sidebar 內可見
      var sb=document.getElementById('sb');
      var sbR=sb.getBoundingClientRect();
      var itR=item.getBoundingClientRect();
      if(itR.top<sbR.top+10||itR.bottom>sbR.bottom-10){
        item.scrollIntoView({behavior:'smooth',block:'center'});
      }
    }
  }
}
window.addEventListener('scroll',updateActive,{passive:true});
updateActive();

/* ─── 防複製 ─── */
(function(){
  var blk=function(e){ e.preventDefault(); return false; };
  ['contextmenu','copy','cut','selectstart','dragstart','mousedown'].forEach(function(ev){
    document.addEventListener(ev,function(e){
      if(ev==='mousedown'&&e.button!==2) return;
      blk(e);
    },true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')) blk(e);
    if(k==='F12') blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')) blk(e);
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-51-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
